name: node
description: Node.js project (package.json)
priority: 10
files:
  - path: package.json
    patterns:
      - regexp: '"name"\s*:\s*"@(?P<org>[^/]+)/(?P<project_name>[^"]+)"'
        description: scoped package org and name
      - regexp: '"name"\s*:\s*"(?P<project_name>[^"@][^"]*)"'
        description: unscoped package name
      - regexp: '"version"\s*:\s*"(?P<version>[^"]+)"'
        description: package version
      - regexp: '"description"\s*:\s*"(?P<description>[^"]+)"'
        description: package description
      - regexp: '"author"\s*:\s*"(?P<author>[^"]+)"'
        description: package author
      - regexp: '"license"\s*:\s*"(?P<license>[^"]+)"'
        description: package license
